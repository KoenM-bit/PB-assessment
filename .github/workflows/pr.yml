name: PR Checks

on:
  pull_request:
    branches: [master, staging]

jobs:
  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/web/package-lock.json
      - run: npm install
      - run: npm run typecheck
      - run: npm test -- --run

  functions:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: netlify/functions
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm install
      - run: npm run typecheck
      - run: npm test -- --run

  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -e "ml/[dev]"
      - run: ruff check ml/src ml/tests tests
      - run: cd ml && pytest -v
      - run: pytest tests/integration -v
