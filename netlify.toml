[build]
  command = "bash scripts/netlify-build.sh"
  publish = "apps/web/dist"
  functions = "netlify/functions"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"
  ignored_node_modules = []

[build.environment]
  NODE_VERSION = "20"

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

[context.production]
  environment = { APP_ENV = "production", MODEL_ALIAS = "champion" }

# Deploy context for the `staging` branch (set production branch to `master` in Netlify UI)
[context.staging]
  environment = { APP_ENV = "staging", MODEL_ALIAS = "challenger" }

[context.deploy-preview]
  environment = { APP_ENV = "staging", MODEL_ALIAS = "challenger" }

# PR deploy previews: enabled via scripts/setup-netlify-previews.sh (free tier).
# Each PR gets a unique URL: deploy-preview-N--pb-assessment.netlify.app

[dev]
  command = "bash scripts/dev-web.sh"
  targetPort = 5173
  port = 8888
  autoLaunch = false
  framework = "vite"
