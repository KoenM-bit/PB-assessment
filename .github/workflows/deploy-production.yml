name: Deploy Production

# Production Netlify deploys happen automatically when `master` is updated.
# Use this workflow for an explicit pre-production verification gate.
on:
  workflow_dispatch:
    inputs:
      confirm:
        description: "Type 'deploy' to confirm production verification"
        required: true

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Check confirmation
        if: inputs.confirm != 'deploy'
        run: |
          echo "Confirmation failed. Type 'deploy' to proceed."
          exit 1

  ci:
    needs: validate
    uses: ./.github/workflows/ci.yml

  smoke:
    needs: ci
    runs-on: ubuntu-latest
    steps:
      - name: Verify production site responds
        run: |
          curl -fsS "https://pb-assessment.netlify.app/api/monitoring" | head -c 200
          echo ""
          echo "Production API reachable."
