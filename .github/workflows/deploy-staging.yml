name: Staging Smoke Test

# Post-deploy smoke test after Netlify finishes the staging branch deploy.
on:
  workflow_dispatch:
  push:
    branches: [staging]

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Run E2E smoke tests
        env:
          E2E_BASE_URL: https://staging--pb-assessment.netlify.app
        run: bash scripts/run-e2e-smoke.sh
