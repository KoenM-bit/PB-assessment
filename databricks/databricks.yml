bundle:
  name: house-price-ml

variables:
  catalog:
    description: Unity Catalog name
  model_alias:
    description: Model alias for serving (champion/challenger)

targets:
  staging:
    mode: development
    default: true
    variables:
      catalog: house_price_staging
      model_alias: challenger
    workspace:
      host: ${var.databricks_host}

  prod:
    mode: production
    variables:
      catalog: house_price_prod
      model_alias: champion
    workspace:
      host: ${var.databricks_host}

resources:
  jobs:
    bronze_ingest:
      name: "[${bundle.target}] Bronze Ingest"
      tasks:
        - task_key: ingest
          notebook_task:
            notebook_path: ./notebooks/01_bronze_ingest.py

    silver_clean:
      name: "[${bundle.target}] Silver Clean"
      tasks:
        - task_key: clean
          notebook_task:
            notebook_path: ./notebooks/02_silver_clean.py

    gold_features:
      name: "[${bundle.target}] Gold Features"
      tasks:
        - task_key: features
          notebook_task:
            notebook_path: ./notebooks/03_gold_features.py

    train_model:
      name: "[${bundle.target}] Train Model"
      tasks:
        - task_key: train
          notebook_task:
            notebook_path: ./notebooks/04_train_model.py

    evaluate_model:
      name: "[${bundle.target}] Evaluate Model"
      schedule:
        quartz_cron_expression: "0 0 6 * * ?"
        timezone_id: "Europe/Amsterdam"
      tasks:
        - task_key: evaluate
          notebook_task:
            notebook_path: ./notebooks/05_evaluate_model.py

    feature_monitoring:
      name: "[${bundle.target}] Feature Monitoring"
      schedule:
        quartz_cron_expression: "0 30 6 * * ?"
        timezone_id: "Europe/Amsterdam"
      tasks:
        - task_key: monitor
          notebook_task:
            notebook_path: ./notebooks/06_feature_monitoring.py
