name: CI

on:
  pull_request:
    branches: [master, staging]
  push:
    branches: [master, staging]
  workflow_call:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/web/package-lock.json
      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint
      - run: npm test -- --run
      - run: npm run build

  functions:
    name: Netlify Functions
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: netlify/functions
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: netlify/functions/package-lock.json
      - run: npm ci
      - run: npm run typecheck
      - run: npm test

  python:
    name: Python ML
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: ml/pyproject.toml
      - run: pip install -e "ml/[dev]"
      - run: ruff check ml/src ml/tests tests
      - run: cd ml && pytest tests/unit tests/data tests/model/test_regression.py -v
      - run: pytest tests/integration -v

  netlify-build:
    name: Netlify Build
    runs-on: ubuntu-latest
    needs: [frontend, functions]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: bash scripts/netlify-build.sh

  # Single required status check for branch protection rules.
  required-checks:
    name: required-checks
    runs-on: ubuntu-latest
    needs: [frontend, functions, python, netlify-build]
    if: always()
    steps:
      - name: Verify all jobs passed
        run: |
          echo "frontend: ${{ needs.frontend.result }}"
          echo "functions: ${{ needs.functions.result }}"
          echo "python: ${{ needs.python.result }}"
          echo "netlify-build: ${{ needs.netlify-build.result }}"
          for result in "${{ needs.frontend.result }}" "${{ needs.functions.result }}" "${{ needs.python.result }}" "${{ needs.netlify-build.result }}"; do
            if [ "$result" != "success" ]; then
              echo "One or more CI jobs failed."
              exit 1
            fi
          done
          echo "All CI jobs passed."
