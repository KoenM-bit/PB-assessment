# Quality gates for training and promotion — edit thresholds here.

holdout:
  beats_baseline: true
  max_mae_vs_baseline_ratio: 1.10
  min_pct_within_10pct: 0.50

walk_forward:
  model_beats_baseline: true

segments:
  max_mae_degradation_vs_overall: 1.30
  min_segment_sample_size: 15

promotion:
  max_mae_vs_champion_ratio: 1.10
