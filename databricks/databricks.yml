bundle:
  name: house-price-ml

variables:
  catalog:
    description: Unity Catalog name
    default: house_price_staging
  model_alias:
    description: Model alias for serving (champion/challenger)
    default: challenger
  ml_wheel_path:
    description: Workspace path to house_price_ml wheel (upload with make upload-ml-wheel)
    default: /Workspace/Users/${workspace.current_user.userName}/libs/house_price_ml-0.1.0-py3-none-any.whl

# Workspace host: set DATABRICKS_HOST in the environment (or use `databricks auth login`).
# Databricks bundles do not allow ${var.*} interpolation on workspace.host.

targets:
  staging:
    mode: development
    default: true
    variables:
      catalog: house_price_staging
      model_alias: challenger

  prod:
    mode: production
    variables:
      catalog: house_price_prod
      model_alias: champion

resources:
  jobs:
    bronze_ingest:
      name: "[${bundle.target}] Bronze Ingest"
      environments:
        - environment_key: serverless
          spec:
            client: "2"
      tasks:
        - task_key: ingest
          environment_key: serverless
          notebook_task:
            notebook_path: ./notebooks/01_bronze_ingest.py
            base_parameters:
              catalog: ${var.catalog}
              wheel_path: ${var.ml_wheel_path}

    silver_clean:
      name: "[${bundle.target}] Silver Clean"
      environments:
        - environment_key: serverless
          spec:
            client: "2"
      tasks:
        - task_key: clean
          environment_key: serverless
          notebook_task:
            notebook_path: ./notebooks/02_silver_clean.py
            base_parameters:
              catalog: ${var.catalog}
              wheel_path: ${var.ml_wheel_path}

    gold_features:
      name: "[${bundle.target}] Gold Features"
      environments:
        - environment_key: serverless
          spec:
            client: "2"
      tasks:
        - task_key: features
          environment_key: serverless
          notebook_task:
            notebook_path: ./notebooks/03_gold_features.py
            base_parameters:
              catalog: ${var.catalog}
              wheel_path: ${var.ml_wheel_path}

    train_model:
      name: "[${bundle.target}] Train Model"
      environments:
        - environment_key: serverless
          spec:
            client: "2"
      tasks:
        - task_key: train
          environment_key: serverless
          notebook_task:
            notebook_path: ./notebooks/04_train_model.py
            base_parameters:
              catalog: ${var.catalog}
              model_alias: ${var.model_alias}
              wheel_path: ${var.ml_wheel_path}

    evaluate_model:
      name: "[${bundle.target}] Evaluate Model"
      schedule:
        quartz_cron_expression: "0 0 6 * * ?"
        timezone_id: "Europe/Amsterdam"
      environments:
        - environment_key: serverless
          spec:
            client: "2"
      tasks:
        - task_key: evaluate
          environment_key: serverless
          notebook_task:
            notebook_path: ./notebooks/05_evaluate_model.py
            base_parameters:
              catalog: ${var.catalog}
              wheel_path: ${var.ml_wheel_path}

    feature_monitoring:
      name: "[${bundle.target}] Feature Monitoring"
      schedule:
        quartz_cron_expression: "0 30 6 * * ?"
        timezone_id: "Europe/Amsterdam"
      environments:
        - environment_key: serverless
          spec:
            client: "2"
      tasks:
        - task_key: monitor
          environment_key: serverless
          notebook_task:
            notebook_path: ./notebooks/06_feature_monitoring.py
            base_parameters:
              catalog: ${var.catalog}
              wheel_path: ${var.ml_wheel_path}

    full_ml_pipeline:
      name: "[${bundle.target}] Full ML Pipeline"
      environments:
        - environment_key: serverless
          spec:
            client: "2"
      tasks:
        - task_key: bronze
          environment_key: serverless
          notebook_task:
            notebook_path: ./notebooks/01_bronze_ingest.py
            base_parameters:
              catalog: ${var.catalog}
              wheel_path: ${var.ml_wheel_path}
        - task_key: silver
          depends_on:
            - task_key: bronze
          environment_key: serverless
          notebook_task:
            notebook_path: ./notebooks/02_silver_clean.py
            base_parameters:
              catalog: ${var.catalog}
              wheel_path: ${var.ml_wheel_path}
        - task_key: gold
          depends_on:
            - task_key: silver
          environment_key: serverless
          notebook_task:
            notebook_path: ./notebooks/03_gold_features.py
            base_parameters:
              catalog: ${var.catalog}
              wheel_path: ${var.ml_wheel_path}
        - task_key: train
          depends_on:
            - task_key: gold
          environment_key: serverless
          notebook_task:
            notebook_path: ./notebooks/04_train_model.py
            base_parameters:
              catalog: ${var.catalog}
              model_alias: ${var.model_alias}
              wheel_path: ${var.ml_wheel_path}
        - task_key: evaluate
          depends_on:
            - task_key: train
          environment_key: serverless
          notebook_task:
            notebook_path: ./notebooks/05_evaluate_model.py
            base_parameters:
              catalog: ${var.catalog}
              wheel_path: ${var.ml_wheel_path}
