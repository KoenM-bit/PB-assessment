bundle:
  name: house-price-ml

artifacts:
  house_price_ml:
    type: whl
    # Build runs with cwd = path (../ml); wheel must land in ml/dist for bundle upload.
    build: pip wheel . -w dist --no-deps -q
    path: ../ml

variables:
  catalog:
    description: Unity Catalog name
    default: house_price_staging
  model_alias:
    description: Model alias for serving (champion/challenger)
    default: challenger
  git_commit:
    description: Git SHA for experiment tags (set by CI via --var git_commit=...)
    default: unknown
  ml_wheel_path:
    description: Workspace path to house_price_ml wheel (built by bundle deploy)
    default: ${workspace.root_path}/artifacts/.internal/house_price_ml-0.1.0-py3-none-any.whl

# Shared job parameters for train notebooks (04_train_model.py).
x-train-job-parameters: &train_job_parameters
  - name: git_commit
    default: ""
  - name: enable_tuning
    default: "false"
  - name: enable_ablation
    default: "false"
  - name: enable_explainability
    default: "false"
  - name: register_model
    default: "true"

x-train-base-parameters: &train_base_parameters
  catalog: ${var.catalog}
  git_commit: "{{job.parameters.git_commit}}"
  wheel_path: ${var.ml_wheel_path}
  enable_tuning: "{{job.parameters.enable_tuning}}"
  enable_ablation: "{{job.parameters.enable_ablation}}"
  enable_explainability: "{{job.parameters.enable_explainability}}"
  register_model: "{{job.parameters.register_model}}"
  mlflow_experiment: ""

x-train-ml-environment: &train_ml_environment
  environment_key: serverless_ml
  spec:
    client: "2"
    dependencies:
      - ${var.ml_wheel_path}
      - optuna>=3.5
      - shap>=0.44

# Workspace host: set DATABRICKS_HOST in the environment (or use `databricks auth login`).
# Databricks bundles do not allow ${var.*} interpolation on workspace.host.

targets:
  staging:
    mode: development
    default: true
    variables:
      catalog: house_price_staging
      model_alias: challenger

  prod:
    mode: production
    variables:
      catalog: house_price_prod
      model_alias: champion

resources:
  jobs:
    bronze_ingest:
      name: "[${bundle.target}] Bronze Ingest"
      environments:
        - environment_key: serverless
          spec:
            client: "2"
            dependencies:
              - ${var.ml_wheel_path}
      tasks:
        - task_key: ingest
          environment_key: serverless
          notebook_task:
            notebook_path: ./notebooks/01_bronze_ingest.py
            base_parameters:
              catalog: ${var.catalog}
              wheel_path: ${var.ml_wheel_path}
              profile: engineering
              rows: "10000"

    silver_clean:
      name: "[${bundle.target}] Silver Clean"
      environments:
        - environment_key: serverless
          spec:
            client: "2"
            dependencies:
              - ${var.ml_wheel_path}
      tasks:
        - task_key: clean
          environment_key: serverless
          notebook_task:
            notebook_path: ./notebooks/02_silver_clean.py
            base_parameters:
              catalog: ${var.catalog}
              wheel_path: ${var.ml_wheel_path}

    gold_features:
      name: "[${bundle.target}] Gold Features"
      environments:
        - environment_key: serverless
          spec:
            client: "2"
            dependencies:
              - ${var.ml_wheel_path}
      tasks:
        - task_key: features
          environment_key: serverless
          notebook_task:
            notebook_path: ./notebooks/03_gold_features.py
            base_parameters:
              catalog: ${var.catalog}
              wheel_path: ${var.ml_wheel_path}

    train_model:
      name: "[${bundle.target}] Train Model"
      parameters: *train_job_parameters
      environments:
        - environment_key: serverless
          spec:
            client: "2"
            dependencies:
              - ${var.ml_wheel_path}
        - *train_ml_environment
      tasks:
        - task_key: train
          environment_key: serverless_ml
          notebook_task:
            notebook_path: ./notebooks/04_train_model.py
            base_parameters:
              <<: *train_base_parameters

    evaluate_model:
      name: "[${bundle.target}] Evaluate Model"
      schedule:
        quartz_cron_expression: "0 0 6 * * ?"
        timezone_id: "Europe/Amsterdam"
      environments:
        - environment_key: serverless
          spec:
            client: "2"
            dependencies:
              - ${var.ml_wheel_path}
      tasks:
        - task_key: evaluate
          environment_key: serverless
          notebook_task:
            notebook_path: ./notebooks/05_evaluate_model.py
            base_parameters:
              catalog: ${var.catalog}
              wheel_path: ${var.ml_wheel_path}

    feature_monitoring:
      name: "[${bundle.target}] Feature Monitoring"
      schedule:
        quartz_cron_expression: "0 30 6 * * ?"
        timezone_id: "Europe/Amsterdam"
      environments:
        - environment_key: serverless
          spec:
            client: "2"
            dependencies:
              - ${var.ml_wheel_path}
      tasks:
        - task_key: monitor
          environment_key: serverless
          notebook_task:
            notebook_path: ./notebooks/06_feature_monitoring.py
            base_parameters:
              catalog: ${var.catalog}
              wheel_path: ${var.ml_wheel_path}

    serving_metrics:
      name: "[${bundle.target}] Serving Metrics Rollup"
      schedule:
        quartz_cron_expression: "0 45 6 * * ?"
        timezone_id: "Europe/Amsterdam"
      environments:
        - environment_key: serverless
          spec:
            client: "2"
            dependencies:
              - ${var.ml_wheel_path}
      tasks:
        - task_key: serving_metrics
          environment_key: serverless
          notebook_task:
            notebook_path: ./notebooks/08_serving_metrics.py
            base_parameters:
              catalog: ${var.catalog}
              wheel_path: ${var.ml_wheel_path}
              timeout_ms: "30000"
              lookback_days: "90"

    full_ml_pipeline:
      name: "[${bundle.target}] Full ML Pipeline"
      parameters: *train_job_parameters
      environments:
        - environment_key: serverless
          spec:
            client: "2"
            dependencies:
              - ${var.ml_wheel_path}
        - *train_ml_environment
      tasks:
        - task_key: bronze
          environment_key: serverless
          notebook_task:
            notebook_path: ./notebooks/01_bronze_ingest.py
            base_parameters:
              catalog: ${var.catalog}
              wheel_path: ${var.ml_wheel_path}
              profile: engineering
              rows: "10000"
        - task_key: silver
          depends_on:
            - task_key: bronze
          environment_key: serverless
          notebook_task:
            notebook_path: ./notebooks/02_silver_clean.py
            base_parameters:
              catalog: ${var.catalog}
              wheel_path: ${var.ml_wheel_path}
        - task_key: gold
          depends_on:
            - task_key: silver
          environment_key: serverless
          notebook_task:
            notebook_path: ./notebooks/03_gold_features.py
            base_parameters:
              catalog: ${var.catalog}
              wheel_path: ${var.ml_wheel_path}
        - task_key: train
          depends_on:
            - task_key: gold
          environment_key: serverless_ml
          notebook_task:
            notebook_path: ./notebooks/04_train_model.py
            base_parameters:
              <<: *train_base_parameters
        - task_key: error_analysis
          depends_on:
            - task_key: train
          environment_key: serverless_ml
          notebook_task:
            notebook_path: ./notebooks/07_error_analysis.py
            base_parameters:
              catalog: ${var.catalog}
              wheel_path: ${var.ml_wheel_path}
        - task_key: evaluate
          depends_on:
            - task_key: train
          environment_key: serverless
          notebook_task:
            notebook_path: ./notebooks/05_evaluate_model.py
            base_parameters:
              catalog: ${var.catalog}
              wheel_path: ${var.ml_wheel_path}

    ml_experiment_pipeline:
      name: "[${bundle.target}] ML Experiment Pipeline"
      parameters:
        - name: git_commit
          default: ""
        - name: enable_tuning
          default: "true"
        - name: enable_ablation
          default: "true"
        - name: enable_explainability
          default: "true"
        - name: register_model
          default: "false"
      environments:
        - environment_key: serverless
          spec:
            client: "2"
            dependencies:
              - ${var.ml_wheel_path}
        - *train_ml_environment
      tasks:
        - task_key: bronze
          environment_key: serverless
          notebook_task:
            notebook_path: ./notebooks/01_bronze_ingest.py
            base_parameters:
              catalog: ${var.catalog}
              wheel_path: ${var.ml_wheel_path}
              profile: engineering
              rows: "10000"
        - task_key: silver
          depends_on:
            - task_key: bronze
          environment_key: serverless
          notebook_task:
            notebook_path: ./notebooks/02_silver_clean.py
            base_parameters:
              catalog: ${var.catalog}
              wheel_path: ${var.ml_wheel_path}
        - task_key: gold
          depends_on:
            - task_key: silver
          environment_key: serverless
          notebook_task:
            notebook_path: ./notebooks/03_gold_features.py
            base_parameters:
              catalog: ${var.catalog}
              wheel_path: ${var.ml_wheel_path}
        - task_key: train
          depends_on:
            - task_key: gold
          environment_key: serverless_ml
          notebook_task:
            notebook_path: ./notebooks/04_train_model.py
            base_parameters:
              <<: *train_base_parameters
              mlflow_experiment: "/Shared/house_price_prediction_lab"
        - task_key: error_analysis
          depends_on:
            - task_key: train
          environment_key: serverless_ml
          notebook_task:
            notebook_path: ./notebooks/07_error_analysis.py
            base_parameters:
              catalog: ${var.catalog}
              wheel_path: ${var.ml_wheel_path}

    error_analysis:
      name: "[${bundle.target}] Error Analysis"
      environments:
        - environment_key: serverless
          spec:
            client: "2"
            dependencies:
              - ${var.ml_wheel_path}
      tasks:
        - task_key: analyze
          environment_key: serverless
          notebook_task:
            notebook_path: ./notebooks/07_error_analysis.py
            base_parameters:
              catalog: ${var.catalog}
              wheel_path: ${var.ml_wheel_path}
