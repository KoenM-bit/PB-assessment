# Enterprise ML experiment-lab configuration

target_column: label_sale_price
date_column: sale_date
id_column: listing_id
random_state: 42

excluded_features:
  - asking_price
  - sale_price_per_sqm

sections:
  univariate: true
  categorical_eda: true
  bivariate: true
  time_drift: true
  feature_matrix: true

split:
  train_fraction: 0.70
  validation_fraction: 0.15

data_quality:
  max_duplicate_group_row_rate: 0.01
  duplicate_key:
    - region
    - postcode
    - property_type
    - energy_label
    - surface_area
    - number_of_rooms
    - number_of_bedrooms
    - build_year
    - latitude
    - longitude
    - garden
    - label_sale_price
    - sale_date

eda:
  histogram_bins: 30
  max_numeric_plots: 30
  max_categorical_plots: 30
  max_categories_per_plot: 15
  minimum_category_group_size: 5

business_hypotheses:
  - name: Surface has a meaningful linear relationship with sale price
    kind: numeric_correlation
    feature: surface_area
    target: label_sale_price
    minimum_absolute_correlation: 0.50

  - name: Property type separates average sale prices
    kind: categorical_spread
    feature: property_type
    target: label_sale_price
    minimum_group_size: 5
    minimum_mean_spread: 25000

feature_matrix:
  max_depth: 4
  max_experiments: 500
  stability_top_n: 20

  groups:
    surface:
      - surface_area

    region:
      - region

    coordinates:
      - latitude
      - longitude

    property_type:
      - property_type

    rooms:
      - number_of_rooms
      - number_of_bedrooms

    age:
      - build_year
      - property_age
      - is_new_build

    property_characteristics:
      - energy_label
      - garden

    engineered_space:
      - surface_per_room
      - surface_per_bedroom
      - bedroom_ratio
      - room_density
      - non_bedroom_rooms
      - surface_x_garden

    postcode:
      - postcode_prefix

    historical_market:
      - historic_region_median_price_per_sqm
      - historic_region_property_median_price_per_sqm
      - historic_region_12m_median_price_per_sqm
      - historic_region_property_12m_median_price_per_sqm
      - historic_region_sale_count
      - historic_region_property_sale_count
      - historic_region_12m_sale_count
      - historic_region_property_12m_sale_count
      - historic_region_value_estimate
      - historic_region_property_value_estimate
      - historic_region_12m_value_estimate
      - historic_region_property_12m_value_estimate

  random_forest:
    n_estimators: 200
    min_samples_leaf: 3
    max_features: sqrt

candidate_selection:
  relative_mae_tolerance: 0.02
  top_k_feature_sets: 3
  final_model_relative_mae_tolerance: 0.01

model_selection:
  compare_random_forest: true
  compare_catboost: true

  random_forest:
    n_estimators: 500
    final_n_estimators: 800
    min_samples_leaf: 3
    max_features: sqrt

  catboost:
    iterations: 1000
    minimum_final_iterations: 50
    learning_rate: 0.05
    depth: 6
    loss_function: MAE
    eval_metric: MAE
    early_stopping_rounds: 75
    l2_leaf_reg: 5.0
    random_strength: 1.0

residual_analysis:
  minimum_segment_count: 5
  worst_predictions_n: 30
  histogram_bins: 20
  price_quantiles: 4
  surface_quantiles: 4
  segments:
    - region
    - property_type
    - number_of_bedrooms
    - price_bucket
    - surface_bucket

shap:
  enabled: false
  sample_size: 200
  max_display: 20
