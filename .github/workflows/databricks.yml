name: Databricks

# Enterprise CI/CD: run the same operations as `make` from GitHub Actions (no laptop required).
# Secrets: DATABRICKS_HOST, DATABRICKS_TOKEN, DATABRICKS_SQL_WAREHOUSE_ID

on:
  workflow_dispatch:
    inputs:
      command:
        description: "Operation (maps to make / scripts/databricks-ci.sh)"
        required: true
        type: choice
        options:
          - staging-pipeline
          - staging-pipeline-deploy
          - production-pipeline
          - bundle-deploy
          - upload-wheel
          - run-pipeline
          - deploy-serving
          - deploy-serving-local
          - promote-champion
          - promote-to-production
          - verify
          - init-catalog
          - bootstrap-production
      target:
        description: "Databricks bundle target"
        required: true
        type: choice
        default: staging
        options:
          - staging
          - prod
      confirm_promote:
        description: "Type 'yes' for promote-to-production"
        required: false
        default: "no"

  push:
    branches: [staging]
    paths:
      - "databricks/**"
      - "ml/**"
      - "scripts/databricks-ci.sh"
      - "scripts/databricks-bundle-deploy.sh"
      - "scripts/upload-ml-wheel.sh"
      - "scripts/deploy-serving.py"
      - "scripts/promote-to-production.py"
      - ".github/workflows/databricks.yml"

concurrency:
  group: databricks-${{ github.ref }}-${{ github.workflow }}
  cancel-in-progress: false

jobs:
  databricks:
    name: ${{ github.event_name == 'workflow_dispatch' && inputs.command || 'auto' }}
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
      DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
      DATABRICKS_SQL_WAREHOUSE_ID: ${{ secrets.DATABRICKS_SQL_WAREHOUSE_ID }}
      CONFIRM_PROMOTE: ${{ github.event_name == 'workflow_dispatch' && inputs.command == 'promote-to-production' && inputs.confirm_promote == 'yes' && 'yes' || '' }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: ml/pyproject.toml

      - uses: databricks/setup-cli@main

      - name: Install build tools for ML wheel
        run: pip install pip build hatchling

      - name: Install ML package (for local-train deploy path)
        run: pip install -e "ml/[dev]"

      - name: Resolve command
        id: cmd
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "command=${{ inputs.command }}" >> "$GITHUB_OUTPUT"
            echo "target=${{ inputs.target }}" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Push to staging: only retrain when ml/ changed; otherwise sync bundle jobs only.
          BEFORE="${{ github.event.before }}"
          AFTER="${{ github.sha }}"
          if [ -n "$BEFORE" ] && [ "$BEFORE" != "0000000000000000000000000000000000000000" ] \
            && git cat-file -e "${BEFORE}^{commit}" 2>/dev/null; then
            CHANGED="$(git diff --name-only "$BEFORE" "$AFTER")"
          elif git rev-parse HEAD~1 >/dev/null 2>&1; then
            CHANGED="$(git diff --name-only HEAD~1 HEAD)"
          else
            CHANGED="$(git show --name-only --pretty=format: HEAD | sed '/^$/d')"
          fi
          echo "Changed files:"
          echo "$CHANGED"

          if echo "$CHANGED" | grep -qE '^(ml/src/|databricks/notebooks/)'; then
            echo "command=staging-pipeline" >> "$GITHUB_OUTPUT"
            echo "Auto: training code changed → pipeline (no serving deploy)" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "command=bundle-deploy" >> "$GITHUB_OUTPUT"
            echo "Auto: config-only change → bundle-deploy only (no retrain)" >> "$GITHUB_STEP_SUMMARY"
          fi
          echo "target=staging" >> "$GITHUB_OUTPUT"

      - name: Gate production promotion
        if: steps.cmd.outputs.command == 'promote-to-production' || steps.cmd.outputs.command == 'production-pipeline'
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.confirm_promote }}" != "yes" ]; then
            echo "Production promotion requires confirm_promote=yes in workflow_dispatch." >&2
            exit 1
          fi
          if [ "${{ github.event_name }}" = "push" ]; then
            echo "Production pipeline cannot run on push — use workflow_dispatch." >&2
            exit 1
          fi

      - name: Run Databricks command
        run: |
          chmod +x scripts/databricks-ci.sh scripts/*.sh
          ./scripts/databricks-ci.sh "${{ steps.cmd.outputs.command }}" "${{ steps.cmd.outputs.target }}"
