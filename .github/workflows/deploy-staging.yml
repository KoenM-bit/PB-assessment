name: Staging Smoke Test

# Optional post-deploy smoke test for the staging branch URL.
on:
  workflow_dispatch:
  push:
    branches: [staging]

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Wait for Netlify staging deploy
        run: sleep 90
      - name: Check staging API
        run: |
          curl -fsS "https://staging--pb-assessment.netlify.app/api/monitoring" | head -c 300
          echo ""
