# Training pipeline configuration — edit here instead of hardcoding in train.py.
# Override path: TRAINING_CONFIG_PATH env or train --config <path>

model_type: random_forest

random_forest:
  n_estimators: 200
  max_depth: 12
  random_state: 42
  n_jobs: -1

ridge:
  alpha: 1.0

splits:
  walk_forward_folds: 3
  walk_forward_test_quarters: 1
  holdout_test_quarters: 2
